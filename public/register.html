<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar - Art&Cachimbo</title>
    <link href="https://fonts.googleapis.com/css2?family=Georgia&display=swap" rel="stylesheet">
    <style>
        /* Reset e Fontes */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Georgia', serif; }
        
        body {
            background-color: #1a0f00;
            color: #f4e4bc;
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('static/textura_madeira.jpg');
            background-size: cover;
            min-height: 100vh;
        }

        /* Header e Logotipo */
        header {
            text-align: center;
            padding: 20px 0;
            position: relative;
        }

        /* Menu de Navega칞칚o com Logo Central */
        nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 0;
        }

        .nav-btn {
            background: #4a341b;
            border: 2px solid #8b5e34;
            color: #d4af37;
            padding: 8px 20px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: inset 0 0 10px #000;
            transition: 0.3s;
        }

        .nav-btn:hover {
            background: #5d4326;
            transform: scale(1.05);
        }

        .content {
            text-align: center;
            margin: 40px auto;
            max-width: 500px;
            padding: 30px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            border: 2px solid #8b5e34;
        }

        .content h2 {
            color: #fff;
            margin-bottom: 30px;
            font-size: 2rem;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            color: #d4af37;
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #8b5e34;
            border-radius: 5px;
            background: rgba(0,0,0,0.3);
            color: #fff;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: #d4af37;
            box-shadow: 0 0 5px rgba(212, 175, 55, 0.3);
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: #d4af37;
            color: #000;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-submit:hover {
            background: #b8941f;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .login-link {
            margin-top: 20px;
            color: #ccc;
        }

        .login-link a {
            color: #d4af37;
            text-decoration: none;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        /* Engrenagens Decorativas */
        .gears-footer {
            height: 60px;
            background: #22150a;
            border-top: 5px solid #110904;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            overflow: hidden;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <a href="index.html" class="nav-btn">HOME</a>
            <a href="historia.html" class="nav-btn">HIST칍RIA</a>
            <a href="produtos.html" class="nav-btn">PORTIFOLIO</a>
            <img src="static/LgC.jpeg" alt="Logo Central" style="max-width: 200px; margin: 0 20px; border-radius: 10px; box-shadow: 0 0 15px rgba(0,0,0,0.8);">
            <a href="catalogo.html" class="nav-btn">CAT츼LOGO</a>
            <a href="login.html" class="nav-btn">LOGIN</a>
            <a href="register.html" class="nav-btn">REGISTRAR</a>
        </nav>
    </header>

    <div class="content">
        <h2>Registrar Conta</h2>
        
        <form id="registerForm">
            <div class="form-group">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>
            
            <div class="form-group">
                <label for="username">Nome de Usu치rio:</label>
                <input type="text" id="username" name="username" required>
            </div>
            
            <div class="form-group">
                <label for="senha">Senha:</label>
                <input type="password" id="senha" name="senha" required>
            </div>
            
            <button type="submit" class="btn-submit">Registrar Conta</button>
        </form>
        
        <div class="login-link">
            <p>J치 tem uma conta? <a href="login.html">Fa칞a login aqui</a></p>
        </div>
    </div>

    <footer class="gears-footer">
        <span style="color: #4a341b; font-size: 2rem;">丘뙖잺 丘뙖잺 丘뙖잺 丘뙖잺 丘뙖잺 丘뙖잺 丘뙖잺</span>
    </footer>

    <script src="js/init-admin.js"></script>
    <script src="js/visit-tracker.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/admin-button-simple.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Limpa mensagens anteriores
            const existingMsg = document.querySelector('.message');
            if (existingMsg) {
                existingMsg.remove();
            }
            
            const nome = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const username = document.getElementById('username').value;
            const senha = document.getElementById('senha').value;
            
            // Valida칞칚o
            if (!nome || !email || !username || !senha) {
                showMessage('Por favor, preencha todos os campos.', 'error');
                return;
            }
            
            // Valida칞칚o de email
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showMessage('Por favor, insira um email v치lido.', 'error');
                return;
            }
            
            // Valida칞칚o de senha
            if (senha.length < 6) {
                showMessage('A senha deve ter pelo menos 6 caracteres.', 'error');
                return;
            }
            
            if (username.length < 3) {
                showMessage('O nome de usu치rio deve ter pelo menos 3 caracteres.', 'error');
                return;
            }
            
            // Simula칞칚o de registro bem-sucedido
            showMessage('Conta criada com sucesso! Redirecionando para o login...', 'success');
            
            // Salva dados no localStorage (simula칞칚o de banco de dados)
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            users.push({
                nome: nome,
                email: email,
                username: username,
                senha: btoa(senha), // Simples codifica칞칚o (n칚o segura para produ칞칚o)
                createdAt: new Date().toISOString()
            });
            localStorage.setItem('users', JSON.stringify(users));
            
            // Redireciona para o login ap칩s 2 segundos
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 2000);
        });
        
        function showMessage(text, type) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message';
            messageDiv.style.cssText = `
                background: ${type === 'error' ? 'rgba(220, 53, 69, 0.2)' : 'rgba(40, 167, 69, 0.2)'};
                border: 1px solid ${type === 'error' ? '#dc3545' : '#28a745'};
                color: ${type === 'error' ? '#dc3545' : '#28a745'};
                padding: 10px;
                margin-bottom: 20px;
                border-radius: 5px;
                text-align: center;
            `;
            messageDiv.textContent = text;
            
            const form = document.getElementById('registerForm');
            form.parentNode.insertBefore(messageDiv, form);
        }
        
        // Verifica se j치 est치 logado
        window.addEventListener('load', function() {
            if (localStorage.getItem('loggedIn') === 'true') {
                showMessage('Voc칡 j치 est치 logado como ' + localStorage.getItem('username'), 'success');
            }
        });
    </script>

</body>
</html>
