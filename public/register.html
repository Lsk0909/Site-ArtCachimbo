<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar - Art&Cachimbo</title>
    <link href="https://fonts.googleapis.com/css2?family=Georgia&display=swap" rel="stylesheet">
    <style>
        /* Reset e Fontes */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Georgia', serif; }
        
        body {
            background-color: #1a0f00;
            color: #f4e4bc;
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('static/textura_madeira.jpg');
            background-size: cover;
            min-height: 100vh;
        }

        /* Header e Logotipo */
        header {
            text-align: center;
            padding: 20px 0;
            position: relative;
        }

        /* Menu de Navegação com Logo Central */
        nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 0;
        }

        .nav-btn {
            background: #4a341b;
            border: 2px solid #8b5e34;
            color: #d4af37;
            padding: 8px 20px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: inset 0 0 10px #000;
            transition: 0.3s;
        }

        .nav-btn:hover {
            background: #5d4326;
            transform: scale(1.05);
        }

        .content {
            text-align: center;
            margin: 40px auto;
            max-width: 500px;
            padding: 30px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            border: 2px solid #8b5e34;
        }

        .content h2 {
            color: #fff;
            margin-bottom: 30px;
            font-size: 2rem;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            color: #d4af37;
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #8b5e34;
            border-radius: 5px;
            background: rgba(0,0,0,0.3);
            color: #fff;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: #d4af37;
            box-shadow: 0 0 5px rgba(212, 175, 55, 0.3);
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: #d4af37;
            color: #000;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-submit:hover {
            background: #b8941f;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .login-link {
            margin-top: 20px;
            color: #ccc;
        }

        .login-link a {
            color: #d4af37;
            text-decoration: none;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        /* Engrenagens Decorativas */
        .gears-footer {
            height: 60px;
            background: #22150a;
            border-top: 5px solid #110904;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            overflow: hidden;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <a href="index.html" class="nav-btn">HOME</a>
            <a href="historia.html" class="nav-btn">HISTÓRIA</a>
            <a href="produtos.html" class="nav-btn">PORTIFOLIO</a>
            <img src="static/LgC.jpeg" alt="Logo Central" style="max-width: 200px; margin: 0 20px; border-radius: 10px; box-shadow: 0 0 15px rgba(0,0,0,0.8);">
            <a href="catalogo.html" class="nav-btn">CATÁLOGO</a>
            <a href="login.html" class="nav-btn">LOGIN</a>
            <a href="register.html" class="nav-btn">REGISTRAR</a>
        </nav>
    </header>

    <div class="content">
        <h2>Registrar Conta</h2>
        
        <form id="registerForm">
            <div class="form-group">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>
            
            <div class="form-group">
                <label for="username">Nome de Usuário:</label>
                <input type="text" id="username" name="username" required>
            </div>
            
            <div class="form-group">
                <label for="senha">Senha:</label>
                <input type="password" id="senha" name="senha" required>
            </div>
            
            <button type="submit" class="btn-submit">Registrar Conta</button>
        </form>
        
        <div class="login-link">
            <p>Já tem uma conta? <a href="login.html">Faça login aqui</a></p>
        </div>
    </div>

    <footer class="gears-footer">
        <span style="color: #4a341b; font-size: 2rem;">⚙️ ⚙️ ⚙️ ⚙️ ⚙️ ⚙️ ⚙️</span>
    </footer>

    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Simulação de registro
            const nome = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const username = document.getElementById('username').value;
            const senha = document.getElementById('senha').value;
            
            // Validação básica
            if (nome && email && username && senha) {
                if (senha.length < 6) {
                    alert('A senha deve ter pelo menos 6 caracteres.');
                    return;
                }
                
                alert('Registro simulado! Em um site real, isso criaria sua conta e redirecionaria para o login.');
                // window.location.href = 'login.html';
            } else {
                alert('Por favor, preencha todos os campos.');
            }
        });
    </script>

</body>
</html>
