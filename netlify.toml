[build]
  publish = "public"
  command = "echo 'Static site - no build needed'"

# Headers para segurança
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Cache-Control = "public, max-age=31536000"

# Redirects para URLs amigáveis
[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 301

[[redirects]]
  from = "/login"
  to = "/login.html"
  status = 301

[[redirects]]
  from = "/register"
  to = "/register.html"
  status = 301

[[redirects]]
  from = "/catalogo"
  to = "/catalogo.html"
  status = 301

[[redirects]]
  from = "/produtos"
  to = "/produtos.html"
  status = 301

[[redirects]]
  from = "/historia"
  to = "/historia.html"
  status = 301

# Fallback para SPA (Single Page Application)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
