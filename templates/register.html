{% extends 'base.html' %}

{% block content %}
<div style="text-align: center; margin: 40px auto; max-width: 500px; padding: 30px; background: rgba(255,255,255,0.1); border-radius: 15px; border: 2px solid #8b5e34;">
    <h2 style="color: #fff; margin-bottom: 30px; font-size: 2rem;">Registrar Conta</h2>
    
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <div style="background: rgba(212, 175, 55, 0.2); border: 1px solid #d4af37; color: #d4af37; padding: 10px; margin-bottom: 20px; border-radius: 5px;">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    
    <form method="POST" style="text-align: left;">
        <div style="margin-bottom: 20px;">
            <label for="nome" style="color: #d4af37; display: block; margin-bottom: 5px; font-weight: bold;">Nome:</label>
            <input type="text" id="nome" name="nome" required style="width: 100%; padding: 10px; border: 1px solid #8b5e34; border-radius: 5px; background: rgba(0,0,0,0.3); color: #fff;">
        </div>
        
        <div style="margin-bottom: 20px;">
            <label for="email" style="color: #d4af37; display: block; margin-bottom: 5px; font-weight: bold;">Email:</label>
            <input type="email" id="email" name="email" required style="width: 100%; padding: 10px; border: 1px solid #8b5e34; border-radius: 5px; background: rgba(0,0,0,0.3); color: #fff;">
        </div>
        
        <div style="margin-bottom: 20px;">
            <label for="username" style="color: #d4af37; display: block; margin-bottom: 5px; font-weight: bold;">Nome de Usuário:</label>
            <input type="text" id="username" name="username" required style="width: 100%; padding: 10px; border: 1px solid #8b5e34; border-radius: 5px; background: rgba(0,0,0,0.3); color: #fff;">
        </div>
        
        <div style="margin-bottom: 30px;">
            <label for="senha" style="color: #d4af37; display: block; margin-bottom: 5px; font-weight: bold;">Senha:</label>
            <input type="password" id="senha" name="senha" required style="width: 100%; padding: 10px; border: 1px solid #8b5e34; border-radius: 5px; background: rgba(0,0,0,0.3); color: #fff;">
        </div>
        
        <button type="submit" style="width: 100%; padding: 15px; background: #d4af37; color: #000; border: none; border-radius: 25px; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: all 0.3s;">
            Registrar Conta
        </button>
    </form>
    
    <div style="margin-top: 20px; color: #ccc;">
        <p>Já tem uma conta? <a href="{{ url_for('login') }}" style="color: #d4af37; text-decoration: none;">Faça login aqui</a></p>
    </div>
</div>
{% endblock %}
